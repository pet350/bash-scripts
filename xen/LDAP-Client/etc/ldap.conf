#
# LDAP Defaults
#

# See ldap.conf(5) for details
# This file should be world readable but not world writable.

BASE	dc=gigaware,dc=lan
URI	ldaps://ldap.gigaware.lan:636 ldaps://xen.gigaware.lan:636

ldap_version 3
rootbinddn cn=admin,dc=gigaware,dc=lan

SIZELIMIT	12
TIMELIMIT	15
DEREF		never

ssl on

# TLS certificates (needed for GnuTLS)
TLS_CACERT	/etc/ldap/sasl2/ldap_server.crt

